      #     docker tag delivery-backend:${{ github.sha }} \
      #       $ECR_REGISTRY/$ECR_REPOSITORY:latest
      #     docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
      #     docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
      # ───────────────────────────────────────────────────────────────────

      - name: "[MOCK] ECR push"
        run: |
          echo "──────────────────────────────────────────────────────"
          echo " MOCK  Would push to ECR:"
          echo "   $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"
          echo "   $ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo " Skipped — no AWS credentials in this environment."
          echo "──────────────────────────────────────────────────────"

  # ──────────────────────────────────────────────────────────
  # 3. Deploy to Staging  (push to main)
  # ──────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - name: "[MOCK] Deploy staging"
        env:
          IMAGE: ${{ needs.build.outputs.image }}
        run: |
          echo "══════════════════════════════════════════════════════"
          echo " MOCK DEPLOY — Staging"
          echo "══════════════════════════════════════════════════════"
          echo ""
          echo "  Cluster   : $ECS_CLUSTER"
          echo "  Service   : $ECS_SERVICE_STG"
          echo "  Image     : $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"
          echo "  Region    : $AWS_REGION"
          echo "  NODE_ENV  : staging"
          echo ""
          echo " Real steps would:"
          echo "   1. aws ecs describe-task-definition → task-def.json"
          echo "   2. Render new task def with updated image"
          echo "   3. aws ecs update-service (rolling deploy)"
          echo "   4. aws ecs wait services-stable"
          echo ""
          echo " Status: ✅ [MOCK] Staging deploy complete"
          echo "══════════════════════════════════════════════════════"

      # ── Real deploy steps (uncomment when AWS is provisioned) ──────────
