      # ───────────────────────────────────────────────────────────────────

  # ──────────────────────────────────────────────────────────
  # 4. Deploy to Production  (version tag v*.*.*)
  # ──────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production

    steps:
      - name: "[MOCK] Deploy production"
        env:
          IMAGE: ${{ needs.build.outputs.image }}
        run: |
          echo "══════════════════════════════════════════════════════"
          echo " MOCK DEPLOY — Production"
          echo "══════════════════════════════════════════════════════"
          echo ""
          echo "  Cluster   : $ECS_CLUSTER"
          echo "  Service   : $ECS_SERVICE_PROD"
          echo "  Image     : $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"
          echo "  Tag       : ${{ github.ref_name }}"
          echo "  Region    : $AWS_REGION"
          echo "  NODE_ENV  : production"
          echo ""
          echo " Real steps would:"
          echo "   1. Promote staged ECR image (no rebuild)"
          echo "   2. aws ecs describe-task-definition → task-def.json"
          echo "   3. Render new task def with updated image"
          echo "   4. aws ecs update-service (rolling deploy)"
          echo "   5. aws ecs wait services-stable"
          echo ""
          echo " Status: ✅ [MOCK] Production deploy complete"
          echo "══════════════════════════════════════════════════════"

      # ── Real deploy steps (uncomment when AWS is provisioned) ──────────
