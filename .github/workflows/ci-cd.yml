# ============================================================
# CI/CD Pipeline — Real-Time Order & Delivery Tracker
#
# Platform : GitHub Actions
# Target   : AWS ECS Fargate (staging) → ECS Fargate (prod)
#
# Flow:
#   PR opened  → test + lint
#   Push main  → test → build image → [mock] deploy staging
#   Tag v*.*   → test → build image → [mock] deploy production
#
# Deploy jobs are MOCKED (no real AWS credentials required).
# Replace the echo blocks with the commented-out AWS steps
# once ECR / ECS infrastructure is provisioned.
# ============================================================

name: CI/CD

on:
  push:
    branches: [main]
    tags:     ['v*.*.*']
  pull_request:
    branches: [main]

env:
  AWS_REGION:       us-east-1
  # ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  ECR_REGISTRY:     '<AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com'
  ECR_REPOSITORY:   delivery-backend
  ECS_CLUSTER:      delivery-cluster
  ECS_SERVICE_STG:  delivery-backend-staging
  ECS_SERVICE_PROD: delivery-backend-production
  CONTAINER_NAME:   delivery-backend

jobs:
  # ──────────────────────────────────────────────────────────
  # 1. Test & Lint  (runs on every PR and push)
  # ──────────────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: secret
        ports: ['27017:27017']
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.4-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          # Lock file lives at the repo root (npm workspaces)
          cache-dependency-path: package-lock.json

      # Install from the workspace root so the lock file is resolved correctly
      - name: Install dependencies
        run: npm ci

      - name: Lint
        working-directory: apps/delivery-backend
        run: npm run lint

      - name: Unit tests
        working-directory: apps/delivery-backend
        run: npm run test

      - name: E2E / Integration tests
        working-directory: apps/delivery-backend
        run: npm run test:e2e
        env:
          MONGODB_URI: mongodb://admin:secret@localhost:27017/delivery_test?authSource=admin
          REDIS_HOST:  localhost
          REDIS_PORT:  6379
          PORT:        3001

  # ──────────────────────────────────────────────────────────
  # 2. Build Docker image  (verifies the Dockerfile is valid)
  # ──────────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    outputs:
      # In production this would be the ECR image URI;
      # here we export the local tag so deploy jobs can reference it.
      image: ${{ steps.build.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        id: build
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --target production \
            --file apps/delivery-backend/Dockerfile \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t delivery-backend:$IMAGE_TAG \
            -t delivery-backend:latest \
            .

          echo "image=delivery-backend:$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "✅ Image built → delivery-backend:$IMAGE_TAG"

      # ── What this step would do with real AWS credentials ──────────────
      # - name: Configure AWS credentials
