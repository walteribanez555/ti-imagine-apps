# ============================================================
# Real-Time Order & Delivery Tracker — Local Infrastructure
# Run with:
#   docker compose --env-file apps/delivery-backend/.env up -d
# ============================================================

services:
  # ----------------------------------------------------------
  # MongoDB — primary data store for Orders
  # ----------------------------------------------------------
  mongodb:
    image: mongo:7.0
    container_name: delivery_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-secret}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-delivery_db}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - ./infra/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - delivery_network

  # ----------------------------------------------------------
  # Redis — pub/sub bridge for WebSocket broadcasts
  #         and optional response caching
  # ----------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    container_name: delivery_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - delivery_network

  # ----------------------------------------------------------
  # NestJS Backend — REST + WebSocket Gateway
  # ----------------------------------------------------------
  delivery-backend:
    build:
      context: .                                    # repo root (workspace lock file lives here)
      dockerfile: apps/delivery-backend/Dockerfile
      target: production
    container_name: delivery_backend
    restart: unless-stopped
    env_file:
      - ./apps/delivery-backend/.env
    environment:
      # Override values injected from the compose-level .env
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-secret}@mongodb:27017/${MONGO_DB:-delivery_db}?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - delivery_network
    develop:
      # hot-reload source when running `docker compose watch`
      watch:
        - action: sync
          path: ./apps/delivery-backend/src
          target: /app/src
        - action: rebuild
          path: ./apps/delivery-backend/package.json

# ----------------------------------------------------------
# Named volumes — data persists between container restarts
# ----------------------------------------------------------
volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

# ----------------------------------------------------------
# Isolated bridge network for inter-service communication
# ----------------------------------------------------------
networks:
  delivery_network:
    driver: bridge
